<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Command - Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>

<body data-page="dashboard">

  <!-- Chrome compartido (sidebar + topbar) inyectado por js/layout.js -->
  <div id="appSidebar"></div>

  <!-- ============================================================ -->
  <!-- MAIN CONTENT -->
  <!-- ============================================================ -->
  <main class="main-content">

    <!-- TOP BAR (inyectada por layout.js) -->
    <div id="appTopbar"></div>

    <!-- ============================================================ -->
    <!-- DASHBOARD SECTION -->
    <!-- ============================================================ -->
    <section id="section-dashboard" class="section active">

      <!-- STAT CARDS -->
      <div class="stats-grid">

        <div class="stat-card card-open">
          <div class="stat-top">
            <div>
              <div class="stat-label">TOTAL ABIERTOS</div>
              <div class="stat-value red" id="statTotalOpen">--</div>
            </div>
            <div class="stat-icon red-icon"><i class="fa-regular fa-calendar"></i></div>
          </div>
          <div class="sparkline-wrapper">
            <canvas id="sparkline1" width="200" height="50"></canvas>
          </div>
        </div>

        <div class="stat-card card-progress">
          <div class="stat-top">
            <div>
              <div class="stat-label">EN PROGRESO</div>
              <div class="stat-value dark" id="statInProgress">--</div>
            </div>
            <div class="stat-icon dark-icon"><i class="fa-solid fa-sliders"></i></div>
          </div>
          <div class="sparkline-wrapper">
            <canvas id="sparkline2" width="200" height="50"></canvas>
          </div>
        </div>

        <div class="stat-card card-resolve">
          <div class="stat-top">
            <div>
              <div class="stat-label">TOTAL RESUELTOS</div>
              <div class="stat-value dark" id="statAvgResolve">--</div>
            </div>
            <div class="stat-icon dark-icon"><i class="fa-regular fa-clock"></i></div>
          </div>
          <div class="sparkline-wrapper">
            <canvas id="sparkline3" width="200" height="50"></canvas>
          </div>
        </div>

        <div class="stat-card card-urgent">
          <div class="stat-top">
            <div>
              <div class="stat-label">TAREAS URGENTES</div>
              <div class="stat-value red" id="statUrgentTasks">--</div>
            </div>
            <div class="stat-icon red-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
          </div>
          <div class="sparkline-wrapper">
            <canvas id="sparkline4" width="200" height="50"></canvas>
          </div>
        </div>

      </div>

      <!-- CONTENT ROW -->
      <div class="content-row">

        <!-- REGISTER ACTIVITY FORM -->
        <div class="form-card">
          <div class="flex-between mb-2px">
            <h2 class="form-title">Registrar Actividad</h2>
            <button class="btn-cancel btn-rapido" id="btnModalRegistroRapido">
              <i class="fa-solid fa-bolt"></i> Rápido
            </button>
          </div>

          <div class="form-grid">
            <!-- Fila 1 -->
            <div class="form-group">
              <label class="form-label" for="solicitante">Solicitante</label>
              <div class="select-wrapper">
                <i class="fa-regular fa-user select-icon-left"></i>
                <select id="solicitante" name="solicitante" class="form-select padded-left" required>
                  <option value="">Cargando solicitantes...</option>
                </select>
                <i class="fa-solid fa-chevron-down select-arrow"></i>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="responsable">Responsable</label>
              <div class="select-wrapper">
                <i class="fa-solid fa-user-tie select-icon-left"></i>
                <select id="responsable" name="responsable" class="form-select padded-left" required>
                  <option value="">Cargando responsables...</option>
                </select>
                <i class="fa-solid fa-chevron-down select-arrow"></i>
              </div>
            </div>

            <!-- Fila 2 - Descripción full width -->
            <div class="form-group full-width">
              <label class="form-label" for="solicitud">Solicitud del usuario</label>
              <textarea id="solicitud" name="solicitud" class="form-textarea"
                placeholder="Descripción detallada de la solicitud..." rows="4" required></textarea>
            </div>

            <!-- Fila 3 -->
            <div class="form-group">
              <label class="form-label" for="estado">Estado</label>
              <div class="select-wrapper">
                <i class="fa-regular fa-clock select-icon-left red"></i>
                <select id="estado" name="estado" class="form-select padded-left" required>
                  <option value="" disabled selected>Estado (Pendiente)</option>
                  <option value="Pendiente">Pendiente</option>
                  <option value="En progreso">En progreso</option>
                  <option value="Resuelto">Resuelto</option>
                  <option value="Cerrado">Cerrado</option>
                </select>
                <i class="fa-solid fa-chevron-down select-arrow"></i>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="prioridad">Prioridad</label>
              <div class="select-wrapper">
                <i class="fa-solid fa-arrow-down select-icon-left"></i>
                <select id="prioridad" name="prioridad" class="form-select padded-left" required>
                  <option value="" disabled selected>Prioridad</option>
                  <option value="Baja">Baja</option>
                  <option value="Media">Media</option>
                  <option value="Alta">Alta</option>
                  <option value="Urgente">Urgente</option>
                </select>
                <i class="fa-solid fa-chevron-down select-arrow"></i>
              </div>
            </div>

            <!-- Fila 4 -->
            <div class="form-group">
              <label class="form-label" for="grupo">Área de Gestión</label>
              <div class="select-wrapper">
                <i class="fa-solid fa-users-gear select-icon-left"></i>
                <select id="grupo" name="grupo" class="form-select padded-left" required>
                  <option value="" disabled selected>Seleccione el Área...</option>
                  <option value="Área 1 (Estructurales)">Área 1 (Estructurales / Legales)</option>
                  <option value="Área 2 (Operativos)">Área 2 (Operativos / Documentales)</option>
                </select>
                <i class="fa-solid fa-chevron-down select-arrow"></i>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="clasificacion">Tipo de Trámite</label>
              <div class="select-wrapper">
                <i class="fa-solid fa-layer-group select-icon-left"></i>
                <!-- Se mapea a grupoExtra internamente, pero el ID puede quedar clasificacion para no romper bindings viejos de js -->
                <select id="clasificacion" name="clasificacion" class="form-select padded-left" required>
                  <option value="" disabled selected>Primero seleccione un Área...</option>
                </select>
                <i class="fa-solid fa-chevron-down select-arrow"></i>
              </div>
            </div>

            <!-- Fila 5 - Fechas -->
            <div class="form-group">
              <label class="form-label flex-between" for="fechaInicio">
                Fecha de Inicio
                <button type="button" id="btnHoyInicio" class="btn-text-link">
                  <i class="fa-solid fa-calendar-day"></i> Hoy
                </button>
              </label>
              <div class="input-wrapper">
                <i class="fa-regular fa-calendar input-icon"></i>
                <input type="date" id="fechaInicio" name="fechaInicio" class="form-input" title="Fecha de Inicio" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label flex-between" for="fechaFin">
                Fecha de Finalización
                <button type="button" id="btnHoyFin" class="btn-text-link">
                  <i class="fa-solid fa-calendar-day"></i> Hoy
                </button>
              </label>
              <div class="input-wrapper">
                <i class="fa-regular fa-calendar input-icon"></i>
                <input type="date" id="fechaFin" name="fechaFin" class="form-input" title="Fecha de Finalización" />
              </div>
            </div>

            <!-- Fila 6 -->
            <div class="form-group">
              <label class="form-label flex-between" for="fechaProgramada">
                Fecha progamada
                <button type="button" id="btnHoyProgramada" class="btn-text-link">
                  <i class="fa-solid fa-calendar-day"></i> Hoy
                </button>
              </label>
              <div class="input-wrapper">
                <i class="fa-regular fa-calendar-check input-icon"></i>
                <input type="date" id="fechaProgramada" name="fechaProgramada" class="form-input"
                  title="Fecha Programada" />
              </div>
            </div>


            <!-- Fila 7 - Detalle técnico - full width -->
            <div class="form-group full-width">
              <label class="form-label" for="detalles">Ruta T / Anexos (Obligatorio para Firmas)</label>
              <input type="text" id="detalles" name="detalles" class="form-input form-input-full"
                placeholder="Ej: T:\Contabilidad\Firmas\2024\...">
            </div>
          </div>

          <!-- FORM ACTIONS -->
          <div class="form-actions">
            <button class="btn-cancel" id="btnResetForm">Cancelar</button>
            <button class="btn-save" id="btnGuardarActividad">
              <span id="btnSaveText">Guardar Actividad</span>
              <span id="btnSaveLoader" class="btn-loader hidden"><i class="fa-solid fa-spinner fa-spin"></i></span>
            </button>
          </div>

          <!-- TOAST NOTIFICATION -->
          <div id="toast" class="toast hidden"></div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">

          <!-- MI ESTADO (TI) -->
          <div class="panel-card">
            <div class="panel-header">
              <h3 class="panel-title">MI ESTADO</h3>
              <i class="fa-solid fa-circle-user panel-icon-left"></i>
            </div>
            <div class="widget-body">

              <div class="form-group widget-group">
                <label class="form-label panel-label-small">¿Quién eres?</label>
                <div class="select-wrapper">
                  <i class="fa-solid fa-user-tie select-icon-left"></i>
                  <select id="mi_nombre" class="form-select padded-left">
                    <option value="">Selecciona tu nombre...</option>
                  </select>
                  <i class="fa-solid fa-chevron-down select-arrow"></i>
                </div>
              </div>

              <div class="form-group widget-group-lg">
                <label class="form-label panel-label-small">Estado Actual</label>
                <div class="select-wrapper">
                  <i class="fa-solid fa-traffic-light select-icon-left"></i>
                  <select id="mi_estado" class="form-select padded-left">
                    <option value="disponible">🟢 Disponible (En Oficina)</option>
                    <option value="en_desarrollo">🔵 Disponible (Home Office)</option>
                    <option value="reunion">🟣 En Reunión</option>
                    <option value="atendiendo">🔴 Ocupada (Trámite)</option>
                    <option value="urgente">🔴 Urgencia</option>
                  </select>
                  <i class="fa-solid fa-chevron-down select-arrow"></i>
                </div>
                <div class="status-circles-container flex-center mt-10px">
                  <button class="status-circle-btn bg-disponible" title="Disponible (En Oficina)"
                    data-estado-rapido="disponible"></button>
                  <button class="status-circle-btn bg-desarrollo" title="Disponible (Home Office)"
                    data-estado-rapido="en_desarrollo"></button>
                  <button class="status-circle-btn bg-reunion" title="En Reunión" data-estado-rapido="reunion"></button>
                  <button class="status-circle-btn bg-atendiendo" title="Ocupada (Trámite)"
                    data-estado-rapido="atendiendo"></button>
                  <button class="status-circle-btn bg-urgente" title="Urgencia" data-estado-rapido="urgente"></button>
                </div>
              </div>

              <!-- Preview del estado actual -->
              <div id="estadoPreviewPanel" class="preview-panel-box">
                <strong class="preview-name" id="previewNombre"></strong>
                <span id="previewEstado"></span>
              </div>

              <button class="btn-save widget-btn-primary" id="btnPublicarMiEstado">
                Actualizar mi Estado
              </button>
            </div>
          </div>

          <!-- SYSTEM STATUS CONTROL -->
          <div class="panel-card" id="panelControlSistemas">
            <div class="panel-header">
              <h3 class="panel-title">CONTROL ESTADO SISTEMAS</h3>
              <button class="icon-btn-sm" title="Publicar Estado"><i class="fa-solid fa-satellite-dish"></i></button>
            </div>
            <div class="widget-body">

              <div class="form-group widget-group">
                <label class="form-label panel-label-small">Sistema Afectado</label>
                <div class="select-wrapper">
                  <i class="fa-solid fa-server select-icon-left"></i>
                  <select id="ctrl_sistema" class="form-select padded-left">
                    <option value="servidor">Servidor Principal</option>
                    <option value="contable">Programa Contable</option>
                    <option value="red">Red e Internet</option>
                  </select>
                  <i class="fa-solid fa-chevron-down select-arrow"></i>
                </div>
              </div>

              <div class="form-group widget-group">
                <label class="form-label panel-label-small">Nuevo Estado</label>
                <div class="select-wrapper">
                  <i class="fa-solid fa-traffic-light select-icon-left"></i>
                  <select id="ctrl_estado" class="form-select padded-left">
                    <option value="ok" selected>🟢 Operando Normal (OK)</option>
                    <option value="warning">🟡 Alerta / Degradado</option>
                    <option value="error">🔴 Servicio Caído / Error</option>
                  </select>
                  <i class="fa-solid fa-chevron-down select-arrow"></i>
                </div>
              </div>

              <div class="form-group widget-group-lg" id="grupo_mensaje">
                <label class="form-label panel-label-small">Mensaje a Empleados</label>
                <div class="input-wrapper">
                  <i class="fa-solid fa-bullhorn input-icon"></i>
                  <input type="text" id="ctrl_mensaje" class="form-input"
                    placeholder="Ej. Equipo TI trabajando en solución..." />
                </div>
              </div>

              <button class="btn-save widget-btn-primary" id="btnPublicarEstadoSistema">
                Publicar Alerta
              </button>
            </div>
          </div>

        </div>

      </div>
    </section>

  </main>

  <!-- Scripts Modulares -->
  <script src="js/utils.js"></script>
  <script src="js/db-service.js"></script>
  <script src="js/tramites-data.js"></script>
  <script src="js/data-manager.js"></script>
  <script src="js/dashboard.js"></script>
  <!-- Chart.js para las gráficas del dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/sparklines.js"></script>
  <script src="js/tickets.js"></script>
  <script src="js/widgets.js"></script>
  <script src="js/notifications.js"></script>
  <!-- Chrome compartido (sidebar + topbar) -->
  <script src="js/layout.js"></script>
  <script src="js/notif-center.js"></script>
  <!-- Main App (Init) -->
  <script src="js/app.js"></script>

  <!-- MODAL REGISTRO RÁPIDO -->
  <div id="modalRapidoOverlay" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="kanban-label-small">NUEVO TICKET</div>
          <div class="kanban-title-large"><i class="fa-solid fa-bolt"></i>Registro Rápido</div>
        </div>
        <button class="modal-close" id="btnCloseModalRapido"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <div class="form-grid form-grid-1">
        <div class="form-group">
          <label class="form-label">Solicitante *</label>
          <div class="select-wrapper">
            <i class="fa-regular fa-user select-icon-left"></i>
            <select id="qr_solicitante" class="form-select padded-left">
              <option value="" disabled selected>Seleccione solicitante...</option>
            </select>
            <i class="fa-solid fa-chevron-down select-arrow"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Responsable (Opcional)</label>
          <div class="select-wrapper">
            <i class="fa-solid fa-user-tie select-icon-left"></i>
            <select id="qr_responsable" class="form-select padded-left">
              <option value="">Sin asignar / Opcional</option>
            </select>
            <i class="fa-solid fa-chevron-down select-arrow"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Solicitud *</label>
          <textarea id="qr_solicitud" class="form-textarea" placeholder="¿Qué se necesita urgente?..."
            rows="3"></textarea>
        </div>

        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label class="form-label">Estado *</label>
            <div class="select-wrapper">
              <i class="fa-regular fa-clock select-icon-left red"></i>
              <select id="qr_estado" class="form-select padded-left">
                <option value="Pendiente" selected>Pendiente</option>
                <option value="En progreso">En progreso</option>
                <option value="Resuelto">Resuelto</option>
                <option value="Cerrado">Cerrado</option>
              </select>
              <i class="fa-solid fa-chevron-down select-arrow"></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Prioridad (Opcional)</label>
            <div class="select-wrapper">
              <i class="fa-solid fa-arrow-down select-icon-left"></i>
              <select id="qr_prioridad" class="form-select padded-left">
                <option value="">En blanco / Ninguna</option>
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Urgente">Urgente</option>
              </select>
              <i class="fa-solid fa-chevron-down select-arrow"></i>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions form-actions-mt">
        <button class="btn-cancel" id="btnCancelModalRapido">Cancelar</button>
        <button class="btn-save" id="btnGuardarRegistroRapido">
          <span id="btnModalRapidoText">Crear Ticket Rápido</span>
          <span id="btnModalRapidoLoader" class="btn-loader hidden"><i class="fa-solid fa-spinner fa-spin"></i></span>
        </button>
      </div>
    </div>
  </div>

</body>

</html>
