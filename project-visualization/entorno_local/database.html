<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base de Datos Local (Tabla)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7f6;
      padding: 20px;
      margin: 0;
    }
    h1 {
      color: #333;
    }
    .table-container {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px 15px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
      color: #333;
      font-weight: bold;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    tr:hover {
      background-color: #f1f1f1;
    }
    .empty-msg {
      color: #777;
      font-style: italic;
    }
    .btn-refresh {
      background-color: #0066cc;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .btn-refresh:hover {
      background-color: #005bb5;
    }
    .col-letter {
      background-color: #e8eaed;
      text-align: center;
      color: #5f6368;
      font-weight: bold;
      font-size: 12px;
      padding: 6px 10px;
    }
    .row-num {
      background-color: #e8eaed;
      color: #5f6368;
      text-align: center;
      font-weight: bold;
      width: 30px;
      font-size: 12px;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: 1px solid #ddd;
      background: #eef2ff;
      color: #333;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .tab-btn.active {
      background: #0066cc;
      color: #fff;
      border-color: #0066cc;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    /* Simple list table */
    .list-table {
      width: 100%;
      max-width: 600px;
    }
    .btn-action {
      background: #e8192c;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-add {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 15px;
    }
    .add-wrapper {
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
    }
    .add-input {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      flex: 1;
      max-width: 300px;
    }
  </style>
</head>
<body>

  <h1>Base de Datos Local</h1>
  <p>Vista de datos simulada en <code>localStorage</code>.</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('actividades')">Actividades</button>
    <button class="tab-btn" onclick="switchTab('solicitantes')">Solicitantes</button>
    <button class="tab-btn" onclick="switchTab('responsables')">Responsables</button>
  </div>

  <!-- TAB: ACTIVIDADES -->
  <div id="tab-actividades" class="tab-content active table-container">
    <button class="btn-refresh" onclick="loadData()">Recargar Datos de Actividades</button>
    <table id="dataTable">
      <thead id="dataHead">
        <tr><th>Cargando...</th></tr>
      </thead>
      <tbody id="dataBody">
        <tr><td>Por favor, espera...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- TAB: SOLICITANTES -->
  <div id="tab-solicitantes" class="tab-content table-container">
    <div class="add-wrapper">
      <input type="text" id="newSolicitante" class="add-input" placeholder="Nombre del solicitante" />
      <button class="btn-add" onclick="addItem('db_solicitantes', 'newSolicitante')">Añadir Solicitante</button>
    </div>
    <table class="list-table">
      <thead><tr><th>Nombre del Solicitante</th><th style="width: 80px;">Acción</th></tr></thead>
      <tbody id="listSolicitantes"></tbody>
    </table>
  </div>

  <!-- TAB: RESPONSABLES -->
  <div id="tab-responsables" class="tab-content table-container">
    <div class="add-wrapper" style="flex-direction: column; align-items: flex-start; gap: 8px;">
      <input type="text" id="newResponsable" class="add-input" style="max-width: 100%;" placeholder="Nombre completo" />
      <div style="display: flex; gap: 10px; width: 100%; max-width: 600px;">
        <input type="text" id="newCargo" class="add-input" placeholder="Cargo (ej: Soporte Nivel 1)" />
        <input type="text" id="newFoto" class="add-input" placeholder="URL de Foto (opcional)" />
      </div>
      <button class="btn-add" onclick="addResponsable()">Añadir Responsable TI</button>
    </div>
    <table class="list-table" style="max-width: 100%;">
      <thead>
        <tr>
          <th style="width: 60px;">Foto</th>
          <th>Nombre</th>
          <th>Cargo</th>
          <th style="width: 80px;">Acción</th>
        </tr>
      </thead>
      <tbody id="listResponsables"></tbody>
    </table>
  </div>


  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById('tab-' + tabId).classList.add('active');
      event.target.classList.add('active');
    }

    // CRUD para listas simples
    function renderList(dbKey, bodyId) {
      const list = JSON.parse(localStorage.getItem(dbKey)) || [];
      const tbody = document.getElementById(bodyId);
      
      if (dbKey === 'db_responsables') {
        renderResponsables(list, tbody);
        return;
      }

      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" class="empty-msg">No hay registros.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map((item, index) => {
        let val = String(item).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `<tr>
                  <td>${val}</td>
                  <td><button class="btn-action" onclick="deleteItem('${dbKey}', ${index})">Borrar</button></td>
                </tr>`;
      }).join('');
    }

    function renderResponsables(list, tbody) {
      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">No hay responsables registrados.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map((item, index) => {
        const nombre = typeof item === 'object' ? item.nombre : item;
        const cargo = typeof item === 'object' ? item.cargo : 'Personal TI';
        const foto = (typeof item === 'object' && item.foto) ? item.foto : 'https://i.pravatar.cc/150?u=' + index;
        
        return `<tr>
                  <td style="text-align:center;"><img src="${foto}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:1px solid #ddd;"></td>
                  <td><strong>${nombre}</strong></td>
                  <td>${cargo}</td>
                  <td><button class="btn-action" onclick="deleteItem('db_responsables', ${index})">Borrar</button></td>
                </tr>`;
      }).join('');
    }

    function addResponsable() {
      const nombreInp = document.getElementById('newResponsable');
      const cargoInp = document.getElementById('newCargo');
      const fotoInp = document.getElementById('newFoto');

      const nombre = nombreInp.value.trim();
      const cargo = cargoInp.value.trim() || 'Personal TI';
      const foto = fotoInp.value.trim();

      if (!nombre) return;

      const list = JSON.parse(localStorage.getItem('db_responsables')) || [];
      list.push({ nombre, cargo, foto });
      localStorage.setItem('db_responsables', JSON.stringify(list));

      nombreInp.value = '';
      cargoInp.value = '';
      fotoInp.value = '';
      renderList('db_responsables', 'listResponsables');
    }

    function addItem(dbKey, inputId) {
      const input = document.getElementById(inputId);
      const val = input.value.trim();
      if (!val) return;

      const list = JSON.parse(localStorage.getItem(dbKey)) || [];
      list.push(val);
      localStorage.setItem(dbKey, JSON.stringify(list));
      
      input.value = '';
      renderList(dbKey, 'listSolicitantes');
    }

    function deleteItem(dbKey, index) {
      if (!confirm("¿Eliminar este registro?")) return;
      const list = JSON.parse(localStorage.getItem(dbKey)) || [];
      list.splice(index, 1);
      localStorage.setItem(dbKey, JSON.stringify(list));
      
      renderList(dbKey, dbKey === 'db_solicitantes' ? 'listSolicitantes' : 'listResponsables');
    }
    function loadData() {
      const db = JSON.parse(localStorage.getItem('db_actividades')) || [];
      const thead = document.getElementById('dataHead');
      const tbody = document.getElementById('dataBody');

      if (db.length === 0) {
        thead.innerHTML = '<tr><th>Estado</th></tr>';
        tbody.innerHTML = '<tr><td class="empty-msg">No se encontraron registros de actividades en el sistema local.</td></tr>';
        return;
      }

      // Columnas mapeadas exactamente a la imagen ("Tabla ejemplo del real")
      // Los campos que no vengan del formulario quedarán vacíos (se llenan automáticamente en Sheets)
      const exactCols = [
        { title: 'Fecha de Creación', key: 'fechaCreacion' }, // A
        { title: 'Solicitante', key: 'solicitante' },         // B
        { title: 'Cargo', key: 'cargo' },                     // C (vacío)
        { title: 'Solicitud del usuario', key: 'solicitud' }, // D
        { title: 'Prioridad', key: 'prioridad' },             // E
        { title: 'Estado', key: 'estado' },                   // F
        { title: 'Grupo de actividad', key: 'grupo' },        // G
        { title: 'Grupo', key: 'grupoExtra' },                // H (vacío localmente)
        { title: 'Fecha de Inicio', key: 'fechaInicio' },     // I
        { title: 'Fecha de Finalización', key: 'fechaFin' },  // J
        { title: 'Tiempo', key: 'tiempo' },                   // K (vacío localmente)
        { title: 'Clasificacion', key: 'clasificacion' },     // L (sin tilde en imagen)
        { title: 'Accion tenica', key: 'accion' },            // M (escrito "tenica" en imagen)
        { title: 'Fecha progamada', key: 'fechaProgramada' }, // N (escrito "progamada" en imagen)
        { title: 'Detalles (opcional)', key: 'detalles' },    // O
        { title: 'Responsable', key: 'responsable' }          // P
      ];

      const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M', 'N', 'O', 'P'];

      // Render thead
      let headHtml = '<tr><th class="row-num"></th>';
      headHtml += letters.map(l => '<th class="col-letter">' + l + '</th>').join('');
      headHtml += '</tr><tr><th class="row-num" style="background: #f0f0f0;"></th>';
      headHtml += exactCols.map(c => '<th>' + c.title + '</th>').join('');
      headHtml += '</tr>';
      thead.innerHTML = headHtml;

      // Render tbody (sin reverse, para que el row num coincida con la inserción estilo Sheet)
      tbody.innerHTML = db.map((row, index) => {
        let rowHtml = '<tr><td class="row-num">' + (index + 2) + '</td>'; // El row 1 son los encabezados
        rowHtml += exactCols.map(c => {
          let val = row[c.key] || '';
          // Limpiar caracteres HTML básicos
          val = String(val).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return '<td>' + val + '</td>';
        }).join('');
        rowHtml += '</tr>';
        return rowHtml;
      }).join('');
    }

    // Cargar listas adicionales al iniciar
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      renderList('db_solicitantes', 'listSolicitantes');
      renderList('db_responsables', 'listResponsables');
    });
  </script>

</body>
</html>
